name: CI Pipeline

on:
  # Execução por push
  push:
    branches: [main]
  # Execução manual
  workflow_dispatch:
  # Execução agendada (Cron) - roda diariamente às 05:00
  schedule:
    - cron: '0 2 * * *'

jobs:
  run-tests:
    name: Executar Testes e Gerar Relatório
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes e gerar relatório
        run: npm test

      - name: Carregar relatório para artefactos
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            junit-results.xml
            junit-results*.xml
          retention-days: 7

      - name: Carregar relatório para artefactos
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
